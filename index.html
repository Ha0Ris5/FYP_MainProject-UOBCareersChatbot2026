<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UoB Careers Advisor Chatbot</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #e0e0e0;
    }

    .chat-container {
      width: 90%;
      max-width: 900px;
      height: 85vh;
      background: #1e1e1e;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      border: 1px solid #2a2a2a;
    }

    .chat-header {
      background: linear-gradient(135deg, #7c3aed 0%, #4f46e5 100%);
      padding: 20px 25px;
      display: flex;
      align-items: center;
      gap: 15px;
      box-shadow: 0 4px 12px rgba(124, 58, 237, 0.3);
    }

    .chat-icon {
      width: 42px;
      height: 42px;
      background: white;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
    }

    .chat-title {
      flex: 1;
    }

    .chat-title h1 {
      font-size: 20px;
      font-weight: 600;
      color: white;
      margin-bottom: 2px;
    }

    .chat-title p {
      font-size: 13px;
      color: rgba(255, 255, 255, 0.8);
    }

    .chat-messages {
      flex: 1;
      padding: 25px;
      overflow-y: auto;
      background: #0f0f0f;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .chat-messages::-webkit-scrollbar {
      width: 8px;
    }

    .chat-messages::-webkit-scrollbar-track {
      background: #1a1a1a;
    }

    .chat-messages::-webkit-scrollbar-thumb {
      background: #3a3a3a;
      border-radius: 4px;
    }

    .message {
      display: flex;
      gap: 12px;
      animation: fadeIn 0.3s ease;
    }
