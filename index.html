<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UoB Careers Advisor Chatbot</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #e0e0e0;
    }

    .chat-container {
      width: 90%;
      max-width: 900px;
      height: 85vh;
      background: #1e1e1e;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      border: 1px solid #2a2a2a;
    }

    .chat-header {
      background: linear-gradient(135deg, #7c3aed 0%, #4f46e5 100%);
      padding: 20px 25px;
      display: flex;
      align-items: center;
      gap: 15px;
      box-shadow: 0 4px 12px rgba(124, 58, 237, 0.3);
    }

    .chat-icon {
      width: 42px;
      height: 42px;
      background: white;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
    }

    .chat-title {
      flex: 1;
    }

    .chat-title h1 {
      font-size: 20px;
      font-weight: 600;
      color: white;
      margin-bottom: 2px;
    }

    .chat-title p {
      font-size: 13px;
      color: rgba(255, 255, 255, 0.8);
    }

    .chat-messages {
      flex: 1;
      padding: 25px;
      overflow-y: auto;
      background: #0f0f0f;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .chat-messages::-webkit-scrollbar {
      width: 8px;
    }

    .chat-messages::-webkit-scrollbar-track {
      background: #1a1a1a;
    }

    .chat-messages::-webkit-scrollbar-thumb {
      background: #3a3a3a;
      border-radius: 4px;
    }

    .message {
      display: flex;
      gap: 12px;
      animation: fadeIn 0.3s ease;
    }
    
@keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .message.user {
      flex-direction: row-reverse;
    }

    .message-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 18px;
      font-weight: 600;
    }

    .message.bot .message-avatar {
      background: linear-gradient(135deg, #7c3aed 0%, #4f46e5 100%);
      color: white;
    }

    .message.user .message-avatar {
      background: #2a2a2a;
      color: #a0a0a0;
    }

    .message-content {
      max-width: 70%;
      padding: 12px 16px;
      border-radius: 16px;
      line-height: 1.5;
      font-size: 14.5px;
    }

    .message.bot .message-content {
      background: #252525;
      color: #e0e0e0;
      border-bottom-left-radius: 4px;
    }

    .message.user .message-content {
      background: linear-gradient(135deg, #7c3aed 0%, #6d28d9 100%);
      color: white;
      border-bottom-right-radius: 4px;
    }

    .message-content strong {
      color: #a78bfa;
    }

    .message-content ul {
      margin: 8px 0;
      padding-left: 20px;
    }

    .message-content li {
      margin: 4px 0;
    }

    .typing-indicator {
      display: none;
      padding: 12px 16px;
      background: #252525;
      border-radius: 16px;
      border-bottom-left-radius: 4px;
      width: fit-content;
    }

    .typing-indicator.active {
      display: flex;
      gap: 4px;
      align-items: center;
    }

    .typing-dot {
      width: 8px;
      height: 8px;
      background: #666;
      border-radius: 50%;
      animation: typing 1.4s infinite;
    }

    .typing-dot:nth-child(2) {
      animation-delay: 0.2s;
    }

    .typing-dot:nth-child(3) {
      animation-delay: 0.4s;
    }

    @keyframes typing {
      0%, 60%, 100% {
        transform: translateY(0);
        opacity: 0.7;
      }
      30% {
        transform: translateY(-10px);
        opacity: 1;
      }
    }

    .chat-input-area {
      padding: 20px 25px;
      background: #1a1a1a;
      border-top: 1px solid #2a2a2a;
    }

    .input-wrapper {
      display: flex;
      gap: 12px;
      align-items: center;
      background: #252525;
      border-radius: 12px;
      padding: 4px 4px 4px 18px;
      border: 1px solid #2a2a2a;
      transition: border-color 0.2s;
    }

    .input-wrapper:focus-within {
      border-color: #7c3aed;
    }

    #messageInput {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: #e0e0e0;
      font-size: 15px;
      padding: 12px 0;
      font-family: inherit;
    }

    #messageInput::placeholder {
      color: #666;
    }

    #sendButton {
      background: linear-gradient(135deg, #7c3aed 0%, #6d28d9 100%);
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      transition: all 0.2s;
      font-family: inherit;
    }

    #sendButton:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(124, 58, 237, 0.4);
    }

    #sendButton:active:not(:disabled) {
      transform: translateY(0);
    }

    #sendButton:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .welcome-message {
      text-align: center;
      padding: 40px 20px;
      color: #888;
    }

    .welcome-message h2 {
      color: #a78bfa;
      margin-bottom: 8px;
      font-size: 22px;
    }

    .welcome-message p {
      font-size: 14px;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="chat-container">
    <div class="chat-header">
      <div class="chat-icon">🎓</div>
      <div class="chat-title">
        <h1>UoB Careers Advisor</h1>
